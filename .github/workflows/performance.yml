name: Performance

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  performance:
    name: Performance Validation
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: read
    defaults:
      run:
        shell: bash
    env:
      NODE_AUTH_TOKEN: ${{ github.token }}
      GH_PACKAGES_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache Bun
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock', '**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run benchmarks
        run: node_modules/vitest/vitest.mjs bench --passWithNoTests --run

      - name: Upload failure artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: performance-validation-artifacts
          path: |
            benchmark-results
            performance-results
          if-no-files-found: ignore
