name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-validation:
    name: Fast Validation
    permissions:
      contents: read
      packages: read
    uses: moritzbrantner/reusable-workflows/.github/workflows/fast-validation.yml@workflow-standard-v1
    with:
      bun_version: "1.3.14"
      install_command: bun install --frozen-lockfile
      format_command: bun run format:check
      lint_command: bun run lint
      typecheck_command: bun run check:editor-core && bun run check-types && bun run check-types:tests
      build_command: bun run build
      test_command: bun run test && bun run smoke:package && bun run pack:check
      timeout_minutes: 45
    secrets:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Configure GitHub Packages auth
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          if [ -n "$GH_PACKAGES_TOKEN" ]; then
            echo "//npm.pkg.github.com/:_authToken=$GH_PACKAGES_TOKEN" >> ~/.npmrc
          fi
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
      - name: Run Playwright
        run: bun run test:e2e

  actionlint:
    name: Workflow Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Check workflow files
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color
