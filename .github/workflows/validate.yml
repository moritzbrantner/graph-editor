name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Workflow Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Check workflow files
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

  validate:
    name: Package Validation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
    defaults:
      run:
        shell: bash
    env:
      NODE_AUTH_TOKEN: ${{ github.token }}
      GH_PACKAGES_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache Bun
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock', '**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Typecheck source
        run: bun run check-types

      - name: Typecheck tests
        run: bun run check-types:tests

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Smoke package exports
        run: bun run smoke:package

      - name: Check package tarball
        run: bun run pack:check

      - name: Upload failure artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: validate-repo-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
