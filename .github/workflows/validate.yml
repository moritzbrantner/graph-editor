name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    uses: moritzbrantner/reusable-workflows/.github/workflows/validate-repo.yml@main
    with:
      node_version: "24"
      bun_version: "1.3.14"
      install_command: bun install --frozen-lockfile
      format_command: bun run format:check
      lint_command: bun run lint
      typecheck_command: "bun run check-types && bun run check-types:tests"
      test_command: bun run test
      build_command: bun run build
      post_validate_command: "bun run smoke:package && bun run pack:check"
    secrets: inherit
